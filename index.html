<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div>
        <button onclick="themeswitch()">Поменять тему</button>
    </div>


    <h1>Панель Управлeния</h1>
    <div id="auth-block">
        <h3>Регистрация</h3>
        <input type="text" id="reg-name" placeholder="Логин">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>
        <div id="reg-out"></div>
        <hr>

        <h3>Вход</h3>
        <input type="text" id="log-name" placeholder="Логин">
        <input type="password" id="log-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div id="log-out"></div>
    </div>


    <div id="main-block" style="display: none;">
        <h2>Main</h2>
        <div id="welcome-msg" style="color: green; font-weight: bold;"></div>
        <br>
        <button onclick="logout()" style="background-color: red;color: white;">Выйти</button>
        <hr>

        <div id="admin-panel" style="display: none;">
        <h2>Уведомления</h2>
        <div id="notifications" class="notification-zone"></div>
        <hr>


        <h2>Блок управления</h2>

        <h3>Создать пользователя</h3>
        <input type="text" id="create-name" placeholder="Логин">
        <input type="password" id="create-pass" placeholder="Пароль">
        <button onclick="createUser()">Создать</button>
        <hr>

        <h3>Все пользователи</h3>
        <h3>Уровень 4</h3>
        <table id="users-table">
            <tr>
                <th>ID</th>
                <th>Username</th>
            </tr>
        </table>

        <h3>Уровень 2</h3>
        <div id="users-cards-container" class="cards-container">
            <div>Пользователей нет</div>
        </div>

        <button onclick="getUsers()">Получить и обновить список</button>



        <h3>Статистика пользователей</h3>
     
        <button onclick="getUsersCount()">Показать количество пользователей</button> 
        <span id="stats-count-out"></span>
        <br><br>

        <button onclick="getStats()">Получить статистику</button>
        <div id="stats-out"></div>
        <hr>


        <h3>Поиск пользователей</h3>
        <input type="text" id="search-text" placeholder="Имя для поиска" oninput="searchUsers()">
        <button onclick="searchUsers()">Искать</button>
        <div id="search-out"></div>
        <hr>

        <h3>Сортировка</h3>
        <button onclick="sortUsers('asc')">Сортировать (А-Я)</button>
        <button onclick="sortUsers('desc')">Сортировать (Я-А)</button>
        <button onclick="sortUsersByDate('new')">Сначала новые</button>
        <button onclick="sortUsersByDate('old')">Сначала старые</button>
        <div class="sort-block"></div>
    

        <h3>Удаление по ID</h3>
        <input type="number" id="delete-id" placeholder="ID пользователя">
        <button onclick="deleteUser()">Удалить</button>
        <div id="delete-out"></div>
    

        <div class="level-5">
            <h2>Уровень 5</h2>
            <button onclick="loadLevel5Users()">Обновить панель</button>
            <div id="level5-users-container"></div>
        </div>

        </div>

    </div>

    


    <script>
        const URL = "http://127.0.0.1:8000";

        if (localStorage.getItem("log")) {
            unlock(localStorage.getItem("log")),
            localStorage.getItem("role")
        }

        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-theme");
        }

        function unlock(message, role= "user") {
            localStorage.setItem("log", message);
            localStorage.setItem("role", role);

            document.getElementById("auth-block").style.display = "none";
            document.getElementById("main-block").style.display = "block";
            document.getElementById("welcome-msg").innerText = message + `(Роль: ${role})`;
            
            const panel = document.getElementById("admin-panel");
            
            if (role == "admin") {
                panel.style.display = "block";
                getUsers();
                loadLevel5Users();
            } else {
                panel.style.display = "none";
            }
        }

        function logout() {
            localStorage.removeItem("log");
            localStorage.removeItem("role");
            location.reload();
        }

        async function register() {
            window.event.preventDefault();
            const u = document.getElementById("reg-name").value;
            const p = document.getElementById("reg-pass").value;
            const regRoleSelect = document.getElementById("reg-role");
            const r = regRoleSelect ? regRoleSelect.value : "user";

            const registrationDate = new Date().toISOString();
            
            const res = await fetch(`${URL}/users`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p, role: r, createdAt: registrationDate})
            });

            const data = await res.json();
            
            if (data.error) {
                document.getElementById("reg-out").style.color = "red";
                document.getElementById("reg-out").innerText = "Ошибка: "+data.error;
            } else {
                showNotification(`Пользователь ${u} зарегистрирован`, true);
                unlock("Вы успешно зарегистрировались! ID: " + data.id, r);
            }
        }


        async function login() {
            window.event.preventDefault();
            const u = document.getElementById("log-name").value;
            const p = document.getElementById("log-pass").value;
            
            const res = await fetch(`${URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p, role: "user" })
            });

            const data = await res.json();
            
            if (data.error) {
                document.getElementById("log-out").style.color = "red";
                document.getElementById("log-out").innerText = "Ошибка: " + data.error;
            } else {
                const usersRes = await fetch(`${URL}/users`);
                const usersData = await usersRes.json();
                let currentUser = usersData.find(user => user.username.toLowerCase() === u.toLowerCase());
                
                let userRole = "user";
                if (currentUser && currentUser.role === "admin") {
                    userRole = "admin";
                }

                showNotification("Вход выполнен успешно!", true);
                unlock("Вход выполнен успешно! Добро пожаловать, " + u, userRole);
            }
        }


        async function createUser() {
            const u = document.getElementById("create-name").value;
            const p = document.getElementById("create-pass").value;

            const res = await fetch(`${URL}/users`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p, role: "user" })
             });
             
            const data = await res.json();

            if (data.error) {
                showNotification("Ошибка", false);
            } else {
                showNotification("Пользователь создан", true);
                document.getElementById("create-name").value = "";
                document.getElementById("create-pass").value = "";
                getUsers();
            }
        }

        
        function showNotification(text, isSuccess = true) {
            const el = document.getElementById("notifications");
            if (!el) return;
            el.innerHTML += `<span>${text}</span><br>`;
            el.style.display = "block";
        }




        function update(usersData) {
            const table = document.getElementById("users-table");
            const cardsContainer = document.getElementById("users-cards-container");

            table.innerHTML = "<tr><th>ID</th><th>Username</th><th>Дата регистрации</th></tr>";
            cardsContainer.innerHTML = "";

            if (!usersData || usersData.length === 0 || usersData.error) {
                cardsContainer.innerHTML = "<div>Пользователей нет</div>";
                return;
            }

            let arr = usersData;
            if (!Array.isArray(usersData)) {
                arr = [usersData];
            }

            arr.forEach(user => {
                const formattedDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString("ru-RU") : "Нет";

                table.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${formattedDate}</td>
                    </tr>`;

                cardsContainer.innerHTML += `
                    <div class="user-card">
                        <p><b>${user.username}</b></p>
                        <p>ID: ${user.id}</p>
                        <p>Регистрация: ${formattedDate}</p>
                    </div>`;
            });
        }


        async function getUsers() {
            const res = await fetch(`${URL}/users`);
            const data = await res.json();
            update(data);
        }

        async function getUsersCount() {
            const res = await fetch(`${URL}/users/count`);
            const data = await res.json();
            document.getElementById("stats-count-out").innerText = data.count;
        }


        async function getStats() {
            const res = await fetch(`${URL}/users/stats`);
            const data = await res.json();
            document.getElementById("stats-out").innerText = JSON.stringify(data);
        }


        async function searchUsers() {
            const txt = document.getElementById("search-text").value.toLowerCase();
            const searchOut = document.getElementById("search-out");
            
            if (txt === "") {
                searchOut.innerHTML = "";
                return;
            }

            const res = await fetch(`${URL}/users`);
            const allUsers = await res.json();
            const filtered = allUsers.filter(user => {
                return user.username.toLowerCase().includes(txt);
            });

           searchOut.innerHTML = "";

            if (filtered.length === 0) {
                searchOut.innerHTML = "<div style='color: gray; margin-top: 5px;'>Ничего не найдено</div>";
                return;
            }

            filtered.forEach(user => {
                searchOut.innerHTML += `
                    <div>
                        <b>ID:</b> ${user.id}  <b>Логин:</b> ${user.username}
                    </div>`;
            });
        }



        async function sortUsers(order) {
            const res = await fetch(`${URL}/users/sort?order=${order}`);
            const data = await res.json();
            const sortOut = document.getElementById("sort-out");
            
            sortOut.innerHTML = "";
            if (!data || data.length === 0 || data.error) {
                sortOut.innerHTML = "<div>Нет пользователей для сортировки</div>";
                return;
            }
            
            data.forEach(user => {
                sortOut.innerHTML += `
                    <div">${user.username} (ID: ${user.id})</div>`;
            });
        }



        async function deleteUser() {
            const con = confirm("Вы уверены?")
            if (con == true) {
                const id = document.getElementById("delete-id").value;
                const res = await fetch(`${URL}/users/${id}`, {
                    method: "DELETE"
                });

                const data = await res.json();
                
                if (data.error) {
                    showNotification("Ошибка", false);
                } else {
                    showNotification(data.message || "Пользователь удален", true);
                    document.getElementById("delete-id").value = "";
                    getUsers();
                    loadLevel5Users();
                }
                }
        }


        async function loadLevel5Users() {
            const res = await fetch(`${URL}/users`);
            const data = await res.json();
            
            const container = document.getElementById("level5-users-container");
            container.innerHTML = "";

            data.forEach(user => {
                container.innerHTML += `
                    <p>
                        <span>ID: ${user.id} Логин: ${user.username}</span>
                        <button onclick="level5Delete(${user.id})">Удалить</button>
                        <button onclick="level5Edit(${user.id})">Изменить пароль</button>
                    </p>
                `;
            });
        }


        async function level5Delete(id) {
            const con = confirm("Вы уверены?")
            if (con == true) {
                await fetch(`${URL}/users/${id}`, { method: "DELETE" });
                showNotification(`Пользователь с ID ${id} удален`, true);
                getUsers();
                loadLevel5Users();
            }
        }

        async function level5Edit(id) {
            const newPass = prompt("Введите новый пароль:");
            if (!newPass) return;

            const res = await fetch(`${URL}/users/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: newPass })
            });

            const data = await res.json();

            if (data.error) {
                showNotification("Ошибка", false);
            } else {
                showNotification(data.message || "Пароль изменен", true);
            }

        }



        function themeswitch() {
            document.body.classList.toggle('dark-theme');
            if (document.body.classList.contains("dark-theme")) {
                localStorage.setItem("theme", "dark");
            } else {
                localStorage.setItem("theme", "light");
            }
        }


    </script>
</body>
</html>
