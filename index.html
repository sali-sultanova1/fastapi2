<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Панель Управлния</h1>
    <div id="auth-block">
        <h3>Регистрация</h3>
        <input type="text" id="reg-name" placeholder="Логин">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>
        <div id="reg-out"></div>
        <hr>

        <h3>Вход</h3>
        <input type="text" id="log-name" placeholder="Логин">
        <input type="password" id="log-pass" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div id="log-out"></div>
    </div>


    <div id="main-block" style="display: none;">
        <h2>Main</h2>
        <div id="welcome-msg" style="color: green; font-weight: bold;"></div>
        <br>
        <button onclick="logout()" style="background-color: red;color: white;">Выйти</button>
        <hr>

        <h2>Уведомления</h2>
        <div id="notifications" class="notification-zone" style="display: none;"></div>
        <hr>


        <h2>Блок управления</h2>

        <h3>Все пользователи</h3>
        <h3>Уровень 4</h3>
        <table id="users-table">
            <tr>
                <th>ID</th>
                <th>Username</th>
            </tr>
        </table>

        <h3>Уровень 2</h3>
        <div id="users-cards-container" class="cards-container">
            <div>Пользователей нет</div>
        </div>

        <button onclick="getUsers()">Получить и обновить список</button>



        <h3>Статистика пользователей</h3>
     
        <button onclick="getUsersCount()">Показать количество пользователей</button> 
        <span id="stats-count-out"></span>
        <br><br>

        <button onclick="getStats()">Получить статистику</button>
        <div id="stats-out"></div>
        <hr>


        <h3>Поиск пользователей</h3>
        <input type="text" id="search-text" placeholder="Имя для поиска">
        <button onclick="searchUsers()">Искать</button>
        <div id="search-out"></div>
        <hr>

        <h3>Сортировка</h3>
        <button onclick="sortUsers('asc')">Сортировать (А-Я)</button>
        <button onclick="sortUsers('desc')">Сортировать (Я-А)</button>
        <div id="sort-out"></div>
        <hr>

        <h3>Удаление по ID</h3>
        <input type="number" id="delete-id" placeholder="ID пользователя">
        <button onclick="deleteUser()">Удалить</button>
        <div id="delete-out"></div>
    

        <div class="level-5">
            <h2>Уровень 5</h2>
            <button onclick="loadLevel5Users()">Обновить панель</button>
            <div id="level5-users-container"></div>
        </div>

    </div>

    


    <script>
        const URL = "http://127.0.0.1:8000";

        if (localStorage.getItem("log")) {
            unlock(localStorage.getItem("log"));
        }

        function unlock(message) {
            localStorage.setItem("log", message);
            document.getElementById("auth-block").style.display = "none";
            document.getElementById("main-block").style.display = "block";
            document.getElementById("welcome-msg").innerText = message;
            showNotification("Вход выполнен успешно!", true);
            getUsers();
            loadLevel5Users();
        }

        function logout() {
            localStorage.removeItem("log");
            location.reload();
        }

        async function register() {
            window.event.preventDefault();
            const u = document.getElementById("reg-name").value;
            const p = document.getElementById("reg-pass").value;
            
            const res = await fetch(`${URL}/users`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p })
            });

            const data = await res.json();
            
            if (data.error) {
                document.getElementById("reg-out").style.color = "red";
                document.getElementById("reg-out").innerText = "Ошибка: "+data.error;
            } else {
                unlock("Вы успешно зарегистрировались! ID: " + data.id);
            }
        }

        async function login() {
            window.event.preventDefault();
            const u = document.getElementById("log-name").value;
            const p = document.getElementById("log-pass").value;
            
            const res = await fetch(`${URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: u, password: p, role: "user" })
            });


            const data = await res.json();
            
            if (data.error) {
                document.getElementById("log-out").style.color = "red";
                document.getElementById("log-out").innerText = "Ошибка: " + data.error;
            } else {
                unlock("Вход выполнен успешно! Добро пожаловать, " + u);
            }
        }

        function showNotification(text, isSuccess = true) {
            const el = document.getElementById("notifications");
            el.innerText = text;
            el.className = "notification-zone " + (isSuccess ? "success" : "error");
            el.style.display = "block";
        }



        function update(usersData) {
            const table = document.getElementById("users-table");
            const cardsContainer = document.getElementById("users-cards-container");

            table.innerHTML = "<tr><th>ID</th><th>Username</th></tr>";
            cardsContainer.innerHTML = "";

            if (!usersData || usersData.length === 0 || usersData.error) {
                cardsContainer.innerHTML = "<div>Пользователей нет</div>";
                return;
            }

            let arr = usersData;
            if (!Array.isArray(usersData)) {
                arr = [usersData];
            }

            arr.forEach(user => {
                table.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                    </tr>`;

                cardsContainer.innerHTML += `
                    <div class="user-card">
                        <p><b>${user.username}</b></p>
                        <p>ID: ${user.id}</p>
                    </div>`;
            });
        }


        async function getUsers() {
            const res = await fetch(`${URL}/users`);
            const data = await res.json();
            update(data);
        }

        async function getUsersCount() {
            const res = await fetch(`${URL}/users/count`);
            const data = await res.json();
            document.getElementById("stats-count-out").innerText = data.count;
        }


        async function getStats() {
            const res = await fetch(`${URL}/users/stats`);
            const data = await res.json();
            document.getElementById("stats-out").innerText = JSON.stringify(data);
        }


        async function searchUsers() {
            const txt = document.getElementById("search-text").value;
            const res = await fetch(`${URL}/users/search?text=${txt}`);
            const data = await res.json();
            document.getElementById("search-out").innerText = JSON.stringify(data);
        }

        async function sortUsers(order) {
            const res = await fetch(`${URL}/users/sort?order=${order}`);
            const data = await res.json();
            document.getElementById("sort-out").innerText = JSON.stringify(data);
        }

        async function deleteUser() {
            const id = document.getElementById("delete-id").value;
            const res = await fetch(`${URL}/users/${id}`, {
                method: "DELETE"
            });

            const data = await res.json();
            
            if (data.error) {
                showNotification("Ошибка: "+ data.error, false);
            } else {
                showNotification(data.message || "Пользователь удален", true);
                document.getElementById("delete-id").value = "";
                getUsers();
                loadLevel5Users();
            }
        }


        async function loadLevel5Users() {
            const res = await fetch(`${URL}/users`);
            const data = await res.json();
            
            const container = document.getElementById("level5-users-container");
            container.innerHTML = "";

            data.forEach(user => {
                container.innerHTML += `
                    <p>
                        <span>ID: ${user.id} Логин: ${user.username}</span>
                        <button onclick="level5Delete(${user.id})">Удалить</button>
                        <button onclick="level5Edit(${user.id})">Изменить пароль</button>
                    </p>
                `;
            });
        }

        async function level5Delete(id) {
            await fetch(`${URL}/users/${id}`, { method: "DELETE" });
            showNotification(`Пользователь с ID ${id} удален`, true);
            getUsers();
            loadLevel5Users();
        }

        async function level5Edit(id) {
            const newPass = prompt("Введите новый пароль:");
            if (!newPass) return;

            await fetch(`${URL}/users/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: newPass })
            });

            showNotification(`Пароль для ID ${id} изменен`, true);
        }
    </script>
</body>
</html>
